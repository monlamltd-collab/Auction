name: Nightly Visual Audit

on:
  schedule:
    - cron: '0 5 * * *'    # 5am UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  visual-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      # Visual audit — Human-Eye Auditor (scripts/visual-audit.mjs).
      # Calls the in-process admin endpoint so we don't need new Supabase secrets in CI.
      # writeAlerts:false — we deliberately keep findings out of pipeline_alerts
      # (state-shaped data doesn't belong in an event-shaped table). Instead:
      #   - autoFix:true        — applies known-recipe fixes (v1: hero_image_bleed)
      #   - includeMarkdown:true — returns the full markdown report; saved to audits/
      - name: Run visual audit (markdown report + auto-fix bot)
        continue-on-error: true
        run: |
          # Origin header is required by csrfCheck middleware (lib/security.js).
          # Without it the request is rejected with 403 before reaching the
          # admin-secret check. Use the canonical app origin.
          curl -fsSL --max-time 120 -X POST \
            "https://auctions.bridgematch.co.uk/api/admin/visual-audit" \
            -H "x-admin-secret: $ADMIN_SECRET" \
            -H "Origin: https://auctions.bridgematch.co.uk" \
            -H "Content-Type: application/json" \
            -d '{"writeAlerts": false, "autoFix": true, "includeMarkdown": true}' \
            -o visual-audit-result.json
          if [ -s visual-audit-result.json ]; then
            mkdir -p audits
            DATE=$(date -u +%Y-%m-%d)
            jq -r '.markdown // ""' visual-audit-result.json > "audits/visual-audit-${DATE}.md"
            jq -r '"Visual audit: \(.scannedRows) rows in \(.ms)ms — \(.findingCount) findings (errors: \([.findings[]|select(.severity=="error")]|length), warns: \([.findings[]|select(.severity=="warn")]|length), infos: \([.findings[]|select(.severity=="info")]|length)) — autoFix hero_image_bleed: \(.autoFixApplied.hero_image_bleed.rows_nulled // 0) rows nulled across \(.autoFixApplied.hero_image_bleed.houses_affected // 0) house(s)"' visual-audit-result.json || cat visual-audit-result.json
            # Drop the raw JSON before commit step — only the markdown belongs in the repo
            rm -f visual-audit-result.json
          fi
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}

      - name: Commit and push report
        run: |
          git config user.name "Auction Health Bot"
          git config user.email "noreply@bridgematch.co.uk"
          git add audits/
          git diff --cached --quiet || (git commit -m "chore: nightly visual audit $(date +%Y-%m-%d)" && git push)
