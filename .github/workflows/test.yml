name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Stub vars so modules that import lib/auth.js initialise without a real Supabase instance
      SUPABASE_URL: http://localhost:54321
      SUPABASE_SERVICE_KEY: test-key
      SUPABASE_ANON_KEY: test-anon-key
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
        with:
          # Contract-drift check needs main to diff against. fetch-depth: 0
          # gives full history; the check itself only reads `origin/main`.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Contract-drift gate — fails the build on breaking changes to pinned
      # schemas / event vocabularies. See contracts/README.md.
      - name: contracts/check.js
        env:
          CONTRACTS_BASE_REF: origin/main
        run: node contracts/check.js

      # Single source of truth — same list as `npm test` locally. If you add
      # a test, add it to package.json's "test" script, not here.
      - name: npm test
        run: npm test
