<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curator Review — Auction Brain</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="/public/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #232733;
  --border: #2e3345; --border2: #3a3f52;
  --text: #e8e6e3; --text2: #9ca3b0; --text3: #6b7280;
  --green: #22c55e; --green-dim: #16a34a; --green-bg: rgba(34,197,94,.08);
  --amber: #f59e0b; --amber-bg: rgba(245,158,11,.08);
  --red: #ef4444; --red-bg: rgba(239,68,68,.08);
  --blue: #3b82f6;
  --radius: 10px; --radius-sm: 6px;
  --mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

#auth-gate { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 380px; text-align: center; }
.auth-box h2 { font-size: 1.05rem; margin-bottom: 16px; }
.auth-box input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono); font-size: .85rem; margin-bottom: 12px; }
.auth-box input:focus { outline: none; border-color: var(--green); }
.auth-box button { width: 100%; padding: 10px; background: var(--green); color: #fff; font-weight: 700; border: none; border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-size: .9rem; }
.auth-box button:hover { background: var(--green-dim); }
.auth-box .err { color: var(--red); font-size: .8rem; margin-top: 8px; display: none; }

#dashboard { display: none; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; gap: 12px; flex-wrap: wrap; }
.topbar h1 { font-size: 1rem; font-weight: 700; }
.topbar h1 span { color: var(--green); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-btn { padding: 6px 14px; font-size: .78rem; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; font-family: inherit; transition: all .15s; }
.topbar-btn:hover { border-color: var(--green); color: var(--green); }
.topbar-btn.primary { background: var(--green); color: #fff; border-color: var(--green); }
.topbar-btn.primary:hover { background: var(--green-dim); color: #fff; }

.main { max-width: 980px; margin: 0 auto; padding: 24px; }
.section-head { display: flex; align-items: baseline; justify-content: space-between; margin: 24px 0 12px; gap: 12px; flex-wrap: wrap; }
.section-head h2 { font-size: 1rem; font-weight: 700; }
.section-head .muted { font-size: .8rem; color: var(--text3); display: flex; align-items: center; gap: 8px; }
.btn-inline { padding: 3px 10px; font-size: .7rem; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text2); cursor: pointer; font-family: inherit; }
.btn-inline:hover { border-color: var(--green); color: var(--green); }

.empty { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 32px; text-align: center; color: var(--text3); font-size: .85rem; }
.empty .muted { display: block; margin-top: 6px; font-size: .75rem; color: var(--text3); }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.card-body { padding: 18px; display: grid; grid-template-columns: 180px 1fr; gap: 18px; }
@media (max-width: 720px) { .card-body { grid-template-columns: 1fr; } }
.card-thumb { background: #000; border-radius: var(--radius-sm); aspect-ratio: 1.2/1; overflow: hidden; position: relative; }
.card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-thumb .rank { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.65); color: #fff; font-family: var(--mono); font-size: .75rem; padding: 3px 8px; border-radius: 4px; }
.card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; font-size: .75rem; color: var(--text3); margin-bottom: 8px; }
.chip { padding: 2px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); font-size: .7rem; }
.chip-green { background: var(--green-bg); color: var(--green); border-color: rgba(34,197,94,.25); }
.chip-amber { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,158,11,.25); }
.chip-red { background: var(--red-bg); color: var(--red); border-color: rgba(239,68,68,.25); }
.headline { font-family: 'Source Serif 4', Georgia, serif; font-size: 1.15rem; font-weight: 600; line-height: 1.3; color: var(--text); margin-bottom: 8px; }
.address { font-size: .85rem; color: var(--text2); margin-bottom: 4px; }
.price-row { font-size: .85rem; color: var(--text); margin-bottom: 12px; font-family: var(--mono); }
.prose { font-family: 'Source Serif 4', Georgia, serif; font-size: .92rem; line-height: 1.6; color: var(--text); margin-bottom: 12px; white-space: pre-wrap; }
.hook { font-size: .82rem; color: var(--text2); font-style: italic; padding: 10px 12px; background: var(--surface2); border-radius: var(--radius-sm); margin-bottom: 14px; border-left: 3px solid var(--blue); }
.tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
.btn { padding: 7px 14px; font-size: .78rem; font-weight: 600; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-family: inherit; transition: all .15s; text-decoration: none; display: inline-block; }
.btn:hover { border-color: var(--blue); color: var(--blue); }
.btn-approve { background: var(--green-bg); border-color: rgba(34,197,94,.25); color: var(--green); }
.btn-approve:hover { background: var(--green); color: #fff; }
.btn-reject { color: var(--text3); }
.btn-reject:hover { background: var(--red-bg); border-color: rgba(239,68,68,.25); color: var(--red); }
.btn-copy { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn-copy:hover { background: #2563eb; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 12px 20px; border-radius: var(--radius); font-size: .82rem; box-shadow: 0 12px 40px rgba(0,0,0,.5); display: none; z-index: 100; }
.toast.show { display: block; }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.err { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div id="auth-gate">
  <div class="auth-box">
    <h2>Curator review &mdash; admin only</h2>
    <input type="password" id="auth-secret" placeholder="x-admin-secret" autofocus>
    <button onclick="login()">Sign in</button>
    <div class="err" id="auth-err"></div>
  </div>
</div>

<div id="dashboard">
  <div class="topbar">
    <h1>Auction <span>Brain</span> &middot; Curator review</h1>
    <div class="topbar-right">
      <span id="dateLabel" style="font-size:.78rem;color:var(--text3);font-family:var(--mono)"></span>
      <button class="topbar-btn" onclick="loadPicks()">&#x21bb; Reload</button>
      <button class="topbar-btn primary" onclick="runCycle()">Run cycle now</button>
    </div>
  </div>

  <div class="main">
    <div class="section-head">
      <h2>Pending review</h2>
      <span class="muted" id="pendingMeta"></span>
    </div>
    <div id="pendingList"></div>

    <div class="section-head" style="margin-top:48px">
      <h2>Approved (today)</h2>
      <span class="muted" id="approvedMeta"></span>
    </div>
    <div id="approvedList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let SECRET = null;

function $(id) { return document.getElementById(id); }

// ── DOM helpers — element/text only, NEVER innerHTML for user data ──
function el(tag, props, children) {
  const node = document.createElement(tag);
  if (props) {
    for (const k in props) {
      if (k === 'class') node.className = props[k];
      else if (k === 'style') node.setAttribute('style', props[k]);
      else if (k === 'href' || k === 'src' || k === 'target' || k === 'rel' || k === 'type' || k === 'placeholder' || k === 'loading' || k === 'alt') node.setAttribute(k, props[k]);
      else if (k === 'onclick') node.addEventListener('click', props[k]);
      else if (k === 'text') node.textContent = props[k];
    }
  }
  if (children) {
    for (const c of children) {
      if (c == null || c === false) continue;
      if (typeof c === 'string') node.appendChild(document.createTextNode(c));
      else node.appendChild(c);
    }
  }
  return node;
}

function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

function showToast(msg, type) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || 'ok');
  setTimeout(() => t.classList.remove('show'), 2400);
}

async function api(path, opts) {
  const headers = { ...(opts && opts.headers || {}) };
  if (SECRET) headers['x-admin-secret'] = SECRET;
  if (opts && opts.body && typeof opts.body !== 'string') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(path, { ...(opts || {}), headers });
  if (r.status === 401 || r.status === 403) {
    showToast('Auth failed — check the secret', 'err');
    $('dashboard').style.display = 'none';
    $('auth-gate').style.display = 'flex';
    throw new Error('Auth failed');
  }
  return r;
}

async function login() {
  const v = $('auth-secret').value.trim();
  if (!v) return;
  SECRET = v;
  $('auth-err').style.display = 'none';
  try {
    const r = await api('/api/admin/curator');
    if (!r.ok) throw new Error('http ' + r.status);
    const data = await r.json();
    sessionStorage.setItem('curatorSecret', SECRET);
    $('auth-gate').style.display = 'none';
    $('dashboard').style.display = 'block';
    render(data);
  } catch (e) {
    $('auth-err').textContent = 'Sign in failed.';
    $('auth-err').style.display = 'block';
  }
}

async function loadPicks() {
  try {
    const r = await api('/api/admin/curator');
    if (!r.ok) throw new Error('http ' + r.status);
    render(await r.json());
  } catch (e) {
    showToast('Failed to load picks', 'err');
  }
}

async function runCycle() {
  if (!confirm('Run curator cycle now? This will call Gemini Pro ~8 times (~£0.10).')) return;
  try {
    const r = await api('/api/admin/curator/run', { method: 'POST', body: {} });
    const data = await r.json();
    if (data.ok) showToast('Cycle started — reload in ~60s for results');
    else showToast(data.error || 'Run failed', 'err');
  } catch (e) {
    showToast('Run failed', 'err');
  }
}

async function approve(pickId, btn) {
  btn.disabled = true;
  try {
    const r = await api('/api/admin/curator/' + encodeURIComponent(pickId) + '/approve', { method: 'POST', body: {} });
    if (!r.ok) throw new Error('http ' + r.status);
    showToast('Approved');
    loadPicks();
  } catch (e) {
    showToast('Approve failed', 'err');
    btn.disabled = false;
  }
}

async function reject(pickId, btn) {
  const reason = prompt('Reason (optional):') || '';
  btn.disabled = true;
  try {
    const r = await api('/api/admin/curator/' + encodeURIComponent(pickId) + '/reject', { method: 'POST', body: { reason } });
    if (!r.ok) throw new Error('http ' + r.status);
    showToast('Rejected');
    loadPicks();
  } catch (e) {
    showToast('Reject failed', 'err');
    btn.disabled = false;
  }
}

async function approveAll() {
  if (!confirm('Approve every pending pick for today?')) return;
  try {
    const r = await api('/api/admin/curator/approve-all', { method: 'POST', body: {} });
    const data = await r.json();
    if (data.ok) showToast('Approved ' + data.approved);
    loadPicks();
  } catch (e) {
    showToast('Approve all failed', 'err');
  }
}

async function copyShare(pickId) {
  try {
    const r = await fetch('/api/curator/share/' + encodeURIComponent(pickId));
    if (!r.ok) {
      const e = await r.json().catch(() => ({}));
      showToast(e.error || 'Share fetch failed', 'err');
      return;
    }
    const data = await r.json();
    const full = data.postText + '\n\n' + data.hashtags;
    await navigator.clipboard.writeText(full);
    showToast('Post copied to clipboard');
    window.open(data.imageUrl, '_blank');
  } catch (e) {
    showToast('Copy failed — only works on approved picks', 'err');
  }
}

function pickCard(pick, isApproved) {
  const lot = pick.lot;
  const price = lot.price ? '£' + Number(lot.price).toLocaleString('en-GB') : (lot.priceText || 'Guide TBA');
  const score = lot.score != null ? Number(lot.score).toFixed(1) : '—';

  const thumb = el('div', { class: 'card-thumb' }, [
    el('span', { class: 'rank', text: '#' + pick.rank }),
    lot.imageUrl ? el('img', { src: lot.imageUrl, alt: '', loading: 'lazy' }) : null,
  ]);

  const meta = el('div', { class: 'card-meta' });
  if (lot.propType) meta.appendChild(el('span', { class: 'chip', text: lot.propType }));
  meta.appendChild(el('span', { class: 'chip chip-green', text: 'Score ' + score }));
  meta.appendChild(el('span', { class: 'chip', text: lot.houseDisplay || lot.house }));

  const tags = el('div', { class: 'tags' });
  for (const o of (lot.opps || []).slice(0, 4)) tags.appendChild(el('span', { class: 'chip chip-green', text: o }));
  for (const r of (lot.risks || []).slice(0, 4)) tags.appendChild(el('span', { class: 'chip chip-red', text: r }));

  const actions = el('div', { class: 'actions' });
  if (isApproved) {
    const copyBtn = el('button', { class: 'btn btn-copy', text: 'Copy LinkedIn post', onclick: () => copyShare(pick.pickId) });
    actions.appendChild(copyBtn);
    actions.appendChild(el('a', { class: 'btn', href: lot.lotUrl, target: '_blank', rel: 'noopener', text: 'View lot page' }));
  } else {
    const approveBtn = el('button', { class: 'btn btn-approve', text: 'Approve', onclick: (e) => approve(pick.pickId, e.currentTarget) });
    const rejectBtn = el('button', { class: 'btn btn-reject', text: 'Reject', onclick: (e) => reject(pick.pickId, e.currentTarget) });
    actions.appendChild(approveBtn);
    actions.appendChild(rejectBtn);
    actions.appendChild(el('a', { class: 'btn', href: lot.lotUrl, target: '_blank', rel: 'noopener', text: 'Preview lot' }));
  }

  const right = el('div', null, [
    meta,
    el('div', { class: 'headline', text: pick.headline }),
    el('div', { class: 'address', text: lot.address }),
    el('div', { class: 'price-row', text: price }),
    el('div', { class: 'prose', text: pick.prose }),
    el('div', { class: 'hook', text: pick.hook }),
    (lot.opps?.length || lot.risks?.length) ? tags : null,
    actions,
  ]);

  return el('div', { class: 'card' }, [el('div', { class: 'card-body' }, [thumb, right])]);
}

function render(data) {
  $('dateLabel').textContent = data.pickDate;
  const pending = data.pending || [];
  const approved = data.approved || [];

  // Pending header (with optional Approve-all button)
  const pendingMeta = $('pendingMeta');
  clear(pendingMeta);
  pendingMeta.appendChild(document.createTextNode(pending.length + ' awaiting'));
  if (pending.length > 1) {
    const btn = el('button', { class: 'btn-inline', text: 'Approve all', onclick: approveAll });
    pendingMeta.appendChild(document.createTextNode(' · '));
    pendingMeta.appendChild(btn);
  }

  $('approvedMeta').textContent = approved.length + ' live';

  // Pending list
  const pendingList = $('pendingList');
  clear(pendingList);
  if (pending.length === 0) {
    pendingList.appendChild(el('div', { class: 'empty' }, [
      'No pending picks. ',
      el('span', { class: 'muted', text: "Run the cycle to generate a fresh batch — or wait for tonight's 04:00 run." }),
    ]));
  } else {
    for (const p of pending) pendingList.appendChild(pickCard(p, false));
  }

  // Approved list
  const approvedList = $('approvedList');
  clear(approvedList);
  if (approved.length === 0) {
    approvedList.appendChild(el('div', { class: 'empty', text: 'Nothing approved yet today.' }));
  } else {
    for (const p of approved) approvedList.appendChild(pickCard(p, true));
  }
}

// Auto-login from sessionStorage
const cached = sessionStorage.getItem('curatorSecret');
if (cached) {
  $('auth-secret').value = cached;
  login();
}
</script>

</body>
</html>
